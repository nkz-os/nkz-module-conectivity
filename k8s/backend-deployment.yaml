# =============================================================================
# Connectivity Backend Deployment
# =============================================================================
# Backend API service for Connectivity module
# =============================================================================

---
# Deployment: Connectivity Backend Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectivity-backend
  namespace: nekazari
  labels:
    app: connectivity-backend
    component: backend
    module: connectivity
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connectivity-backend
  template:
    metadata:
      labels:
        app: connectivity-backend
        component: backend
        module: connectivity
    spec:
      containers:
        - name: backend
          # Pinned by digest (= v1.0.1): mutable tags + pullPolicy Always mean a
          # plain pod restart can silently change the running code (CLAUDE.md §K8s).
          image: ghcr.io/nkz-os/nkz-module-conectivity/connectivity-backend@sha256:735d0396c566048be5a6638fc3aa34832861887be225a9e6d32b826679b3dc6f
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_NAME
              value: "Connectivity"
            - name: DEBUG
              value: "false"
            - name: API_PREFIX
              value: "/api/connectivity"
            # Orion-LD Context Broker
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: CONTEXT_URL
              value: "http://api-gateway-service:5000/ngsi-ld-context.json"
            # HMAC signature verification (api-gateway defense-in-depth)
            - name: REQUIRE_HMAC_SIGNATURE
              value: "true"
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            # CORS — production values from connectivity-config ConfigMap (envFrom)
          envFrom:
            - configMapRef:
                name: connectivity-config
                optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

---
# Service: Connectivity Backend API
apiVersion: v1
kind: Service
metadata:
  name: connectivity-api-service
  namespace: nekazari
  labels:
    app: connectivity-backend
    component: backend
    module: connectivity
spec:
  selector:
    app: connectivity-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
