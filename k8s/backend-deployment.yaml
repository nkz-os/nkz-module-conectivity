# =============================================================================
# Connectivity Backend Deployment
# =============================================================================
# Backend API service for Connectivity module
# =============================================================================

---
# Deployment: Connectivity Backend Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectivity-backend
  namespace: nekazari
  labels:
    app: connectivity-backend
    component: backend
    module: connectivity
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connectivity-backend
  template:
    metadata:
      labels:
        app: connectivity-backend
        component: backend
        module: connectivity
    spec:
      containers:
        - name: backend
          image: ghcr.io/k8-benetis/connectivity-backend:v1.0.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_NAME
              value: "Connectivity"
            - name: DEBUG
              value: "false"
            - name: API_PREFIX
              value: "/api/connectivity"
            # MongoDB Configuration (with auth from secret)
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-username
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: root-password
            - name: MONGODB_URL
              value: "mongodb://$(MONGODB_USERNAME):$(MONGODB_PASSWORD)@mongodb-service:27017/"
            # Keycloak Configuration — set KEYCLOAK_URL to your auth server
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: keycloak_url
            - name: KEYCLOAK_REALM
              value: "nekazari"
            - name: JWT_AUDIENCE
              value: "account"
            # Service-to-service auth (optional)
            - name: MODULE_MANAGEMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: module-secrets
                  key: management-key
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

---
# Service: Connectivity Backend API
apiVersion: v1
kind: Service
metadata:
  name: connectivity-api-service
  namespace: nekazari
  labels:
    app: connectivity-backend
    component: backend
    module: connectivity
spec:
  selector:
    app: connectivity-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
