# =============================================================================
# Connectivity Backend Deployment
# =============================================================================
# Backend API service for Connectivity module
# =============================================================================

---
# Deployment: Connectivity Backend Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectivity-backend
  namespace: nekazari
  labels:
    app: connectivity-backend
    component: backend
    module: connectivity
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connectivity-backend
  template:
    metadata:
      labels:
        app: connectivity-backend
        component: backend
        module: connectivity
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/k8-benetis/connectivity-backend:v1.0.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_NAME
              value: "Connectivity"
            - name: DEBUG
              value: "false"
            - name: API_PREFIX
              value: "/api/connectivity"
            # Keycloak Configuration
            - name: KEYCLOAK_URL
              value: "https://auth.artotxiki.com/auth"
            - name: KEYCLOAK_REALM
              value: "nekazari"
            - name: JWT_AUDIENCE
              value: "account"
            # Service-to-service auth (optional)
            - name: MODULE_MANAGEMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: module-secrets
                  key: management-key
                  optional: true
          # Database (if needed - uncomment and configure)
          # - name: DATABASE_URL
          #   valueFrom:
          #     secretKeyRef:
          #       name: postgresql-secret
          #       key: connection-string
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

---
# Service: Connectivity Backend API
apiVersion: v1
kind: Service
metadata:
  name: connectivity-api-service
  namespace: nekazari
  labels:
    app: connectivity-backend
    module: connectivity
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: connectivity-backend
